version: '3.8'

services:
  # The FastAPI backend and Langchain workers
  nexflow-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_ENDPOINT=http://ollama-model-server:11434
      - VECTOR_STORE_DIR=/app/data/chroma_db
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama-model-server
    deploy:
      replicas: 3 # Proving scaling strategy: multiple API workers behind load balancing

  # Isolated Model Inference Server
  ollama-model-server:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ] # Inference tied strictly to GPU resource pools

volumes:
  ollama_data:
